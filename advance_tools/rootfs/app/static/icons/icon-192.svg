<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="192" height="192"
     role="img" aria-label="Advance Tools">
  <title>Advance Tools</title>
  <!-- Same geometry as icon-512.svg with the fine detail dropped, so the mark
       stays readable at launcher/favicon sizes. Maskable-safe (see 512). -->
  <defs>
    <linearGradient id="at-shield-sm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#7b5cff"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="#0f1420"/>

  <path fill="url(#at-shield-sm)" d="M 156 140
    H 356 A 22 22 0 0 1 378 163
    C 378 260 340 344 256 392
    C 172 344 134 260 134 163
    A 22 22 0 0 1 156 140 Z"/>

  <path fill="none" stroke="#0f1420" stroke-width="18" stroke-linecap="round"
        d="M 224 226 v -20 a 14 14 0 0 1 14 -14 h 36 a 14 14 0 0 1 14 14 v 20"/>
  <rect x="186" y="222" width="140" height="98" rx="18" fill="#0f1420"/>
  <rect x="240" y="264" width="32" height="28" rx="9" fill="#4f8cff"/>
</svg>
